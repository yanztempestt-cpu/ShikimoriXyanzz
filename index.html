<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SHIKIMORI DRIP PANEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 380px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 107, 157, 0.5);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 107, 157, 0.3);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .header h1 small {
            font-size: 12px;
            opacity: 0.9;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 5px;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 107, 157, 0.1);
            border-bottom: 1px solid rgba(255, 107, 157, 0.2);
        }

        .status-item {
            text-align: center;
        }

        .status-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-value {
            font-size: 14px;
            font-weight: bold;
            color: #ff6b9d;
        }

        /* Menu Section */
        .menu-section {
            padding: 16px;
        }

        .section-title {
            color: #ff6b9d;
            font-size: 14px;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #ff6b9d;
        }

        .fitur-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .fitur-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fitur-card.active {
            border-color: #ff6b9d;
            background: rgba(255, 107, 157, 0.1);
        }

        .fitur-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }

        .fitur-name {
            color: white;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .fitur-desc {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
        }

        .toggle {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle.active {
            background: #ff6b9d;
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }

        /* Tombol Aksi */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 16px 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ff6b9d;
            border: 1px solid #ff6b9d;
        }

        .btn-primary:active, .btn-secondary:active {
            transform: scale(0.97);
        }

        /* File Config Section */
        .config-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
        }

        .config-title {
            color: #ff6b9d;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .config-content {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            color: #4ade80;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255, 107, 157, 0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #ff6b9d;
            font-size: 10px;
            margin-top: 8px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b9d;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            display: none;
            white-space: nowrap;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .injecting {
            animation: pulse 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SHIKIMORI <small>DRIP v3.0</small></h1>
            <p>🔥 FULL FITUR INJECTOR 🔥</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">STATUS</div>
                <div class="status-value" id="statusText">READY</div>
            </div>
            <div class="status-item">
                <div class="status-label">FITUR AKTIF</div>
                <div class="status-value" id="aktifCount">0</div>
            </div>
            <div class="status-item">
                <div class="status-label">VERSION</div>
                <div class="status-value">OB50+</div>
            </div>
        </div>

        <div class="menu-section">
            <div class="section-title">✨ FITUR PREMIUM</div>
            <div class="fitur-grid" id="fiturGrid"></div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="injectAllBtn">💉 INJECT SEMUA</button>
                <button class="btn btn-secondary" id="resetAllBtn">🔄 RESET</button>
            </div>

            <div class="config-section">
                <div class="config-title">📄 KONFIGURASI ACTIVE</div>
                <div class="config-content" id="configContent"></div>
                <button class="copy-btn" id="copyConfigBtn">📋 COPY CONFIG</button>
            </div>
        </div>

        <div class="footer">
            SHIKIMORI 🩷 YANZZ | Overlay Compatible | Tap Inject untuk Aktifkan
        </div>
    </div>

    <div class="toast" id="toastMsg"></div>

    <script>
        // ==================== KUNCI AKSES ====================
        const VALID_KEY = "SHIKIMORI🩷Yanzz";
        
        // Cek akses
        let isLoggedIn = localStorage.getItem('shikimori_drip_auth');
        if (isLoggedIn !== VALID_KEY) {
            const inputKey = prompt("🔐 SHIKIMORI DRIP PANEL\nMasukkan Kunci Akses:");
            if (inputKey !== VALID_KEY) {
                alert("❌ KODE SALAH! PANEL TIDAK BISA DIGUNAKAN");
                document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:100px;">🔒 UNAUTHORIZED</div>';
                throw new Error("Invalid Key");
            }
            localStorage.setItem('shikimori_drip_auth', VALID_KEY);
        }

        // ==================== DAFTAR FITUR ====================
        const fiturs = [
            { id: "neck_hs", name: "Leher HS", icon: "🎯", desc: "Neck → Head Auto", active: false },
            { id: "pov", name: "POV Lebar", icon: "👁️", desc: "Kamera Luas", active: false },
            { id: "magic_bullet", name: "Magic Bullet", icon: "💫", desc: "Peluru Belok", active: false },
            { id: "auto_hs", name: "Auto Headshot", icon: "🔥", desc: "Auto ke Kepala", active: false },
            { id: "no_recoil", name: "No Recoil", icon: "🛡️", desc: "Tanpa Getar", active: false },
            { id: "instant_lock", name: "Instant Lock", icon: "⚡", desc: "Nempel Cepat", active: false },
            { id: "auto_loot", name: "Auto Loot", icon: "📦", desc: "Jarak Jauh", active: false },
            { id: "wallbang", name: "Wallbang", icon: "🧱", desc: "Tembus Tembok", active: false }
        ];

        // Load saved state
        const savedState = localStorage.getItem('shikimori_drip_state');
        if (savedState) {
            try {
                const parsed = JSON.parse(savedState);
                fiturs.forEach(f => {
                    if (parsed[f.id] !== undefined) f.active = parsed[f.id];
                });
            } catch(e) {}
        }

        // ==================== GENERATE CONFIG FILE ====================
        function generateConfigFile() {
            let config = "[SHIKIMORI_DRIP_CONFIG]\n";
            config += "version=3.0\n";
            config += "device=Infinix_Smart9\n\n";
            
            fiturs.forEach(f => {
                config += `[${f.id}]\n`;
                config += `enable=${f.active ? 1 : 0}\n`;
                if (f.id === "neck_hs") config += "target=neck\n";
                if (f.id === "magic_bullet") config += "turn_angle=45\nmax_distance=180\n";
                if (f.id === "no_recoil") config += "vertical=0\nhorizontal=0\n";
                if (f.id === "auto_loot") config += "loot_distance=150\n";
                config += "\n";
            });
            
            config += "[GLOBAL_SETTINGS]\n";
            config += "dpi=520\n";
            config += "sensitivity=95\n";
            config += "anti_ban=1\n";
            
            return config;
        }

        // ==================== SIMPAN FILE CONFIG KE PENYIMPANAN ====================
        function saveConfigToStorage() {
            const configContent = generateConfigFile();
            localStorage.setItem('shikimori_drip_config', configContent);
            
            // Tampilkan di UI
            document.getElementById('configContent').textContent = configContent.substring(0, 500) + (configContent.length > 500 ? "..." : "");
            
            return configContent;
        }

        // ==================== INJECT KE GAME (SIMULASI TAPI BENERAN NYIMPAN FILE) ====================
        function injectToGame(fiturId, isActive) {
            console.log(`[INJECT] ${fiturId} = ${isActive}`);
            
            // Simpan state
            const config = saveConfigToStorage();
            
            // Trigger download file untuk user (biar bisa ditaruh manual ke folder FF)
            if (isActive) {
                showToast(`✅ ${fiturs.find(f => f.id === fiturId)?.name} AKTIF`);
            } else {
                showToast(`⭕ ${fiturs.find(f => f.id === fiturId)?.name} NONAKTIF`);
            }
            
            // Update status counter
            updateActiveCount();
            
            return config;
        }

        function injectAll() {
            fiturs.forEach(f => f.active = true);
            saveAllState();
            renderFiturGrid();
            saveConfigToStorage();
            showToast("💉 SEMUA FITUR DIINJECT! FILE CONFIG TELAH DIUPDATE");
            
            // Animasi
            document.querySelector('.container').classList.add('injecting');
            setTimeout(() => document.querySelector('.container').classList.remove('injecting'), 500);
        }

        function resetAll() {
            fiturs.forEach(f => f.active = false);
            saveAllState();
            renderFiturGrid();
            saveConfigToStorage();
            showToast("🔄 SEMUA FITUR DIRESET");
        }

        function updateActiveCount() {
            const count = fiturs.filter(f => f.active).length;
            document.getElementById('aktifCount').textContent = count;
            document.getElementById('statusText').textContent = count > 0 ? "INJECTED" : "READY";
        }

        function saveAllState() {
            const state = {};
            fiturs.forEach(f => { state[f.id] = f.active; });
            localStorage.setItem('shikimori_drip_state', JSON.stringify(state));
            updateActiveCount();
        }

        // ==================== RENDER UI ====================
        function renderFiturGrid() {
            const grid = document.getElementById('fiturGrid');
            grid.innerHTML = '';
            
            fiturs.forEach(fitur => {
                const card = document.createElement('div');
                card.className = `fitur-card ${fitur.active ? 'active' : ''}`;
                card.innerHTML = `
                    <span class="fitur-icon">${fitur.icon}</span>
                    <div class="fitur-name">${fitur.name}</div>
                    <div class="fitur-desc">${fitur.desc}</div>
                    <button class="toggle ${fitur.active ? 'active' : ''}" data-id="${fitur.id}">
                        ${fitur.active ? '✅ AKTIF' : '⭕ NONAKTIF'}
                    </button>
                `;
                grid.appendChild(card);
            });
            
            // Pasang event listener untuk toggle buttons
            document.querySelectorAll('.toggle').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const fitur = fiturs.find(f => f.id === id);
                    if (fitur) {
                        fitur.active = !fitur.active;
                        saveAllState();
                        renderFiturGrid();
                        injectToGame(id, fitur.active);
                    }
                });
            });
        }

        // ==================== COPY CONFIG ====================
        async function copyConfig() {
            const config = localStorage.getItem('shikimori_drip_config') || generateConfigFile();
            try {
                await navigator.clipboard.writeText(config);
                showToast("📋 CONFIG TERSALIN! Taruh di folder files FF");
            } catch(err) {
                showToast("❌ GAGAL COPY");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // ==================== DOWNLOAD FILE CONFIG ====================
        function downloadConfig() {
            const config = localStorage.getItem('shikimori_drip_config') || generateConfigFile();
            const blob = new Blob([config], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'DripLite_Master.ini';
            a.click();
            URL.revokeObjectURL(url);
            showToast("📥 FILE CONFIG DIDOWNLOAD! Taruh di folder files FF");
        }

        // ==================== INISIALISASI ====================
        function init() {
            renderFiturGrid();
            saveConfigToStorage();
            updateActiveCount();
            
            // Event listeners
            document.getElementById('injectAllBtn').addEventListener('click', injectAll);
            document.getElementById('resetAllBtn').addEventListener('click', resetAll);
            document.getElementById('copyConfigBtn').addEventListener('click', copyConfig);
            
            // Tambah tombol download
            const configSection = document.querySelector('.config-section');
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'copy-btn';
            downloadBtn.style.marginRight = '8px';
            downloadBtn.textContent = '⬇️ DOWNLOAD .INI';
            downloadBtn.onclick = downloadConfig;
            configSection.insertBefore(downloadBtn, document.getElementById('copyConfigBtn'));
            
            console.log('🚀 SHIKIMORI DRIP PANEL v3.0 READY');
            console.log('💎 Kunci: SHIKIMORI🩷Yanzz');
        }

        init();
    </script>
</body>
</html>
